name: Plugin Index and Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: ${{ github.repository }}
      PLUGIN_RELEASE_TAG: plugins-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate index
        run: node scripts/generate-plugin-index.mjs

      - name: Commit generated index if changed
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain README.md PLUGINS.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md PLUGINS.md
            git commit -m "chore: refresh plugin index [skip ci]"
            git push
          fi

      - name: Build plugin zip packages
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          while IFS= read -r metadata; do
            plugin_dir="$(dirname "$metadata")"
            plugin_name="$(basename "$plugin_dir")"
            parent_dir="$(dirname "$plugin_dir")"
            (
              cd "$parent_dir"
              zip -qr "$GITHUB_WORKSPACE/dist/${plugin_name}.zip" "$plugin_name"
            )
          done < <(find . -name metadata.yaml -not -path "./.git/*" | sort)
          ls -lah dist

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release view "$PLUGIN_RELEASE_TAG" >/dev/null 2>&1 || \
          gh release create "$PLUGIN_RELEASE_TAG" --title "Plugin Packages" --notes "Latest packaged plugins"

      - name: Upload packages to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "$PLUGIN_RELEASE_TAG" dist/*.zip --clobber
